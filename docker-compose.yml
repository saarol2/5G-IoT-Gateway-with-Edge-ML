services:
  mqtt:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf

  middleware:
    build: ./services/middleware
    depends_on:
      - mqtt
    ports:
      - "8080:8080"
    environment:
      - MQTT_BROKER=mqtt
      - MQTT_TOPIC=sensors/temperature

  azure-function:
    build:
      context: .
      dockerfile: ./azure-function/Dockerfile
    ports:
      - "7071:80"
    environment:
      - AzureWebJobsStorage=UseDevelopmentStorage=true
      - FUNCTIONS_WORKER_RUNTIME=python
    volumes:
      - ./azure-function/data:/app/data

  gateway:
    build:
      context: .
      dockerfile: ./gateway/Dockerfile
    depends_on:
      - mqtt
      - azure-function
    environment:
      - MQTT_BROKER=mqtt
      - CLOUD_ENDPOINT=http://azure-function:80/api/iot-data
    deploy:
      replicas: 3

  device:
    build:
      context: .
      dockerfile: ./device-simulator/Dockerfile
    depends_on:
      - middleware
    environment:
      - MIDDLEWARE_URL=http://middleware:8080
    deploy:
      replicas: 100

  ml-trainer:
    build: ./machine-learning
    profiles:
      - training
    volumes:
      - ./machine-learning/data:/app/data
      - ./machine-learning/models:/app/models