services:
  mqtt:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf

  middleware:
    build: ./services/middleware
    depends_on:
      - mqtt
    ports:
      - "8081:8080"
    environment:
      - MQTT_BROKER=mqtt
      - MQTT_TOPIC=sensors/waterpump

  azure-function:
    build:
      context: .
      dockerfile: ./azure-function/Dockerfile
    ports:
      - "7071:80"
    environment:
      - AzureWebJobsStorage=UseDevelopmentStorage=true
      - FUNCTIONS_WORKER_RUNTIME=python
    volumes:
      - ./azure-function/data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:80').read()"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
  edge-ml:
    build:
      context: .
      dockerfile: ./services/edge-ml/Dockerfile
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s

  gateway:
    build:
      context: .
      dockerfile: ./gateway/Dockerfile
    depends_on:
      mqtt:
        condition: service_started
      azure-function:
        condition: service_healthy
      edge-ml:
        condition: service_healthy
    environment:
      - MQTT_BROKER=mqtt
      - CLOUD_ENDPOINT=http://azure-function:80/api/iot-data
      - EDGE_ML_ENDPOINT=http://edge-ml:8000
    deploy:
      replicas: 3

  device:
    build:
      context: .
      dockerfile: ./device-simulator/Dockerfile
    depends_on:
      - middleware
    environment:
      - MIDDLEWARE_URL=http://middleware:8080
    deploy:
      replicas: 100

  ml-trainer:
    build: ./machine-learning
    profiles:
      - training
    volumes:
      - ./machine-learning/data:/app/data
      - ./machine-learning/models:/app/models