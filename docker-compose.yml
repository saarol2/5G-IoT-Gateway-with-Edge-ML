services:
  mqtt:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf

  middleware:
    build: ./services/middleware
    depends_on:
      - mqtt
    ports:
      - "8080:8080"
    environment:
      - MQTT_BROKER=mqtt
      - MQTT_TOPIC=sensors/temperature

  edge-ml:
    build: ./services/edge-ml

  gateway:
    build: ./gateway
    depends_on:
      - mqtt
      - edge-ml
    environment:
      - MQTT_BROKER=mqtt
      - EDGE_ML_ENDPOINT=http://edge-ml:8000/predict
      - CLOUD_ENDPOINT=
    deploy:
      replicas: 3

  device:
    build:
      context: .
      dockerfile: ./device-simulator/Dockerfile
    depends_on:
      - middleware
    environment:
      - MIDDLEWARE_URL=http://middleware:8080
    deploy:
      replicas: 100